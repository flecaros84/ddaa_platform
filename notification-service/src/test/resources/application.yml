# Configuración común para pruebas automatizadas de notification-service.
# Evita depender de Eureka, RabbitMQ real o SMTP real.

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

spring:
  cloud:
    discovery:
      enabled: false

  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientConfiguration
      - org.springframework.cloud.netflix.eureka.serviceregistry.EurekaAutoServiceRegistrationAutoConfiguration

  rabbitmq:
    listener:
      simple:
        # Evita que el listener intente conectarse a RabbitMQ al levantar contextLoads.
        auto-startup: false

  mail:
    # Configuración dummy para que JavaMailSender pueda crearse en tests.
    host: localhost
    port: 2525
    username: test
    password: test

management:
  health:
    rabbit:
      # Evita checks de RabbitMQ durante pruebas.
      enabled: false
    mail:
      # Evita checks SMTP durante pruebas.
      enabled: false

app:
  mail:
    # Correos dummy usados solo para pruebas.
    from: notification-test@local.test
    to: admin-test@local.test