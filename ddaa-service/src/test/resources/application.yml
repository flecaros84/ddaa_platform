eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

spring:
  cloud:
    discovery:
      enabled: false

  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientConfiguration
      - org.springframework.cloud.netflix.eureka.serviceregistry.EurekaAutoServiceRegistrationAutoConfiguration

  datasource:
    url: jdbc:h2:mem:ddaa;MODE=MSSQLServer;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  sql:
    init:
      # En tests no se debe ejecutar data.sql porque contiene datos pensados
      # para la aplicación real y puede chocar con H2.
      # Cada test debe preparar sus propios datos mínimos.
      mode: never

app:
  sample-data:
    enabled: false

  security:
    # Clave dummy usada solo para levantar Spring Security en tests.
    # No es una credencial real y no debe usarse fuera del entorno de pruebas.
    jwt-secret: ddaa-test-secret-key-for-integration-tests-only-123456789