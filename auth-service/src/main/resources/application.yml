server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  config:
    import: optional:file:./local.properties

  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ddaa_auth;encrypt=true;trustServerCertificate=true}
    username: ${DB_USER:ddaa_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  frontend:
    success-url: ${FRONTEND_SUCCESS_URL:http://localhost:5173/}
  security:
    allowed-google-domain: ${ALLOWED_GOOGLE_DOMAIN:camanchaca.cl}
    jwt-secret: ${JWT_SECRET:ddaa-development-secret-key-change-me-1234567890}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
